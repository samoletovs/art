<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#fbf7f0" />
<title>art · naurolabs</title>
<meta name="description" content="A small gallery of art pages, hosted on naurolabs.com." />

<style>
  :root {
    --bg: #fbf7f0;          /* warm paper */
    --ink: #1c1a17;         /* near-black charcoal */
    --muted: #8a847a;       /* graphite */
    --rule: #e6dfd2;        /* soft divider */
    --accent: #9E3039;      /* nauroLabs red */
    --card: #ffffff;
    --shadow: 0 1px 2px rgba(28, 26, 23, 0.04), 0 8px 24px rgba(28, 26, 23, 0.06);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    font-size: 17px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  a { color: inherit; }

  .page {
    max-width: 920px;
    margin: 0 auto;
    padding: clamp(40px, 6vw, 88px) clamp(20px, 4vw, 48px) 64px;
  }

  /* Masthead */
  header.mast {
    margin-bottom: clamp(48px, 7vw, 88px);
  }
  .eyebrow {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 12px;
  }
  h1 {
    font-size: clamp(40px, 7vw, 72px);
    line-height: 1;
    letter-spacing: -0.02em;
    margin: 0 0 16px;
    font-weight: 500;
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
  }
  .lede {
    max-width: 56ch;
    color: var(--muted);
    margin: 0;
    font-size: 19px;
  }

  /* Section heading */
  h2.section {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    border-top: 1px solid var(--rule);
    padding-top: 28px;
    margin: 56px 0 24px;
    font-weight: 500;
  }

  /* Pieces grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }
  .piece {
    display: block;
    text-decoration: none;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 28px 24px;
    min-height: 160px;
    transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease;
  }
  .piece:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
    border-color: transparent;
  }
  .piece .num {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .piece .title {
    font-size: 22px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .piece .meta {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    color: var(--muted);
  }

  /* Empty state */
  .empty {
    border: 1px dashed var(--rule);
    border-radius: 4px;
    padding: 48px 32px;
    text-align: center;
    color: var(--muted);
  }
  .empty p { margin: 0 0 8px; }
  .empty code {
    background: rgba(28, 26, 23, 0.04);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 0.92em;
  }

  /* Footer */
  footer.foot {
    margin-top: 88px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 12px;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    color: var(--muted);
  }
  footer.foot a {
    text-decoration: none;
    border-bottom: 1px solid currentColor;
    padding-bottom: 1px;
  }
  footer.foot .brand {
    color: var(--ink);
  }
  footer.foot .brand b { color: var(--accent); font-weight: 600; }

  @media (prefers-color-scheme: dark) {
    /* Optional gentle dark mode; kept restrained so the gallery doesn't shout. */
    :root {
      --bg: #15130f;
      --ink: #f3eee3;
      --muted: #8a847a;
      --rule: #2a2620;
      --accent: #c9555e;
      --card: #1c1a16;
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.4);
    }
  }
</style>
</head>

<body>
<main class="page">

  <header class="mast">
    <p class="eyebrow">art . naurolabs . com</p>
    <h1>A small <em>gallery</em>.</h1>
    <p class="lede">
      Pages, sketches, and experiments.
      Each piece is its own little corner of the web — open one to step inside.
    </p>
  </header>

  <h2 class="section">Pieces</h2>

  <!--
    To add a new piece:
    1. Save the HTML file in this folder, e.g. "rooftop-rain.html"
    2. Copy one of the <a class="piece"> blocks below and edit href + title + meta
    3. Or leave the empty state — it will hide itself once a piece exists.
  -->

  <div class="grid">

    <a class="piece" href="rococo.html">
      <div class="num">No. 01</div>
      <div class="title">Rococo</div>
      <div class="meta">c. 1720–1780 — style guide</div>
    </a>

    <a class="piece" href="baroque.html">
      <div class="num">No. 02</div>
      <div class="title">Baroque</div>
      <div class="meta">c. 1600–1750 — style guide</div>
    </a>

  </div>

  <footer class="foot">
    <span class="brand">built by nauro<b>Labs</b></span>
    <a href="https://naurolabs.com" rel="noopener">naurolabs.com</a>
  </footer>

</main>
</body>
</html>
